# Payload CMS — Cloudflare Workers deployment (via OpenNext)
name = "website-factory-cms"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 Database (SQLite on Cloudflare)
[[d1_databases]]
binding = "DB"
database_name = "website-factory-db"
database_id = "7eeb12a8-d295-40b3-8bcc-3e6eafcd6a19"

# R2 Bucket for media uploads
[[r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "website-factory-media"

# KV Namespace for sessions/cache
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "2bee696f1e8247628e5d0f4f34577e8b"

[vars]
PAYLOAD_SECRET = "website-factory-secret-change-in-prod"
ADMIN_URL = "https://website-factory-cms.nick-e3c.workers.dev"
FRONTEND_WEBHOOK_URL = "https://website-factory-frontend.pages.dev"
WEBHOOK_SECRET = "wf-webhook-secret-2024"
DATABASE_URL = "file:local.db"
