name: Build & Deploy CMS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Build Next.js (needs wrangler auth for D1 remote binding)
      - run: npm run build

      # Run migrations on remote D1
      - name: Run database migrations
        run: npx cross-env NODE_ENV=production PAYLOAD_SECRET=ignore npx payload migrate

      # Build OpenNext worker bundle
      - run: npx opennextjs-cloudflare build

      # Deploy to Cloudflare Workers
      - name: Deploy
        run: npx opennextjs-cloudflare deploy
