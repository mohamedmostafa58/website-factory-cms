<!DOCTYPE html>
<html>
<head><title>CMS Debug 2</title></head>
<body style="font-family:monospace;padding:20px;background:#111;color:#0f0;">
<h2>Debug 2 — Catching hydration errors</h2>
<pre id="log" style="white-space:pre-wrap;border:1px solid #333;padding:10px;max-height:80vh;overflow:auto;"></pre>
<script>
const log = document.getElementById('log');
function addLog(msg) {
  log.textContent += new Date().toISOString().substr(11,12) + ' ' + msg + '\n';
  log.scrollTop = log.scrollHeight;
}

// Override console.error to catch React errors
const origError = console.error;
console.error = function() {
  const msg = Array.from(arguments).map(a => {
    if (a instanceof Error) return a.message + '\n' + a.stack;
    if (typeof a === 'object') try { return JSON.stringify(a).substring(0,500); } catch(e) { return String(a); }
    return String(a);
  }).join(' ');
  addLog('CONSOLE.ERROR: ' + msg.substring(0, 1000));
  origError.apply(console, arguments);
};

const origWarn = console.warn;
console.warn = function() {
  const msg = Array.from(arguments).map(a => String(a)).join(' ');
  if (msg.includes('error') || msg.includes('Error') || msg.includes('hydrat') || msg.includes('mismatch')) {
    addLog('CONSOLE.WARN: ' + msg.substring(0, 500));
  }
  origWarn.apply(console, arguments);
};

window.addEventListener('error', (e) => {
  addLog('WINDOW ERROR: ' + e.message + ' @ ' + (e.filename||'?') + ':' + (e.lineno||'?') + ':' + (e.colno||'?'));
  if (e.error && e.error.stack) addLog('STACK: ' + e.error.stack.substring(0, 500));
});
window.addEventListener('unhandledrejection', (e) => {
  const r = e.reason;
  addLog('UNHANDLED REJECTION: ' + (r?.message || r?.toString?.() || JSON.stringify(r)).substring(0, 500));
  if (r?.stack) addLog('STACK: ' + r.stack.substring(0, 500));
});

addLog('Now loading /admin/login page content directly into this page...');
addLog('Fetching HTML...');

fetch('/admin/login')
  .then(r => r.text())
  .then(html => {
    addLog('Got HTML: ' + html.length + ' bytes');

    // Extract and load CSS
    const cssLinks = html.match(/href="(\/_next\/static\/css\/[^"]+)"/g) || [];
    addLog('CSS files: ' + cssLinks.length);
    cssLinks.forEach(l => {
      const href = l.match(/href="([^"]+)"/)[1];
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = href;
      document.head.appendChild(link);
    });

    // Extract script src urls
    const scriptSrcs = html.match(/src="(\/_next\/[^"]+\.js)"/g) || [];
    addLog('Script files: ' + scriptSrcs.length);

    // Extract inline scripts (the RSC data)
    const inlineScripts = html.match(/<script>(self\.__next_f.*?)<\/script>/g) || [];
    addLog('Inline RSC scripts: ' + inlineScripts.length);

    // Create a container div
    const container = document.createElement('div');
    container.id = '__next';
    document.body.appendChild(container);

    // Execute inline scripts first (RSC flight data)
    addLog('Executing RSC inline data...');
    inlineScripts.forEach((s, i) => {
      try {
        const code = s.replace(/<\/?script>/g, '');
        eval(code);
        addLog('  RSC chunk ' + i + ': OK');
      } catch(e) {
        addLog('  RSC chunk ' + i + ' ERROR: ' + e.message);
      }
    });

    addLog('RSC data loaded. self.__next_f has ' + (self.__next_f?.length || 0) + ' entries');

    // Now load the JS files
    addLog('Loading JS chunks...');
    let loaded = 0;
    scriptSrcs.forEach(s => {
      const src = s.match(/src="([^"]+)"/)[1];
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = () => {
        loaded++;
        addLog('  Loaded ' + loaded + '/' + scriptSrcs.length + ': ' + src.split('/').pop());
        if (loaded === scriptSrcs.length) {
          addLog('ALL SCRIPTS LOADED — if page is still white, React crashed during hydration');
          addLog('Check CONSOLE.ERROR entries above for the actual error');
        }
      };
      script.onerror = (e) => addLog('  SCRIPT LOAD FAIL: ' + src);
      document.head.appendChild(script);
    });
  })
  .catch(e => addLog('FETCH ERROR: ' + e.message));
</script>
</body>
</html>
